---
layout: default
comments: true
---

<!-- Wrapper-->
<div id="wrapper">
  <!-- Nav -->
  <nav id="nav">
    <a href="http://macrocosme.github.io/#blog" class="icon fa fa-arrow-left"><span>Back to Blog Meta</span></a>
    <a href="#blog" class="icon fa-rss-square active"><span>Blog</span></a>
  </nav>

  <!-- Main -->
  <div id="main">
    <article id="blog" class="panel">
      <h1>{{ page.title }}</h1>

      <div class="entry">
        {{ content }}
      </div>

      <div class="date">
        Written on {{ page.date | date: "%B %e, %Y" }}
      </div>

      {% include disqus.html %}
    </article>
  </div>

</div>
